<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 민원 안내 챗봇</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="header-content">
        <div>
            <div class="logo">🏛 민원안내 AI 챗봇</div>
            <div class="subtitle">공공기관 민원 정보를 AI가 안내해 드립니다</div>
        </div>
        <a href="login.html" class="admin-link">관리자 로그인</a>
    </div>
</header>

<nav>
    <a href="index.html">민원 챗봇</a>
</nav>

<div class="container">
    <div class="chat-box" id="chatBox">
        <div class="message bot">
            <div class="name">AI 민원 안내</div>
            <div class="bubble">안녕하세요! 무엇이 궁금하신가요? 민원 관련 질문을 입력해 주세요.</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="questionInput" placeholder="질문을 입력하세요..." />
        <button onclick="sendMessage()">전송</button>
    </div>
</div>

<footer>
    <p>© 2026 AI 민원 안내 챗봇 | 본 서비스는 프로젝트 목적으로 제작되었습니다.</p>
</footer>

<script src="js/main.js"></script>
</body>
</html>
