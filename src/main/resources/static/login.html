<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - AI 민원 안내 챗봇</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<header>
    <div>
        <div class="logo">🏛 민원안내 AI 챗봇</div>
        <div class="subtitle">공공기관 민원 정보를 AI가 안내해 드립니다</div>
    </div>
</header>

<nav>
    <a href="index.html">민원 챗봇</a>
    <a href="login.html">관리자 로그인</a>
</nav>

<div class="container">
    <div class="login-box">
        <h2>관리자 로그인</h2>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="아이디" autocomplete="username" />
            <input type="password" name="password" placeholder="비밀번호" autocomplete="off" />
            <div id="errorMsg" class="error" style="display:none;">
                아이디와 비밀번호를 정확히 입력해 주세요.
            </div>
            <button type="submit">로그인</button>
        </form>
    </div>
</div>

<footer>
    <p>© 2026 AI 민원 안내 챗봇 | 본 서비스는 프로젝트 목적으로 제작되었습니다.</p>
</footer>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error')) {
        document.getElementById('errorMsg').style.display = 'block';
        document.querySelector('input[name="username"]').value = urlParams.get('username') || '';
        document.querySelector('input[name="password"]').value = '';
        document.querySelector('input[name="password"]').focus();
    }
</script>

</body>
</html>
