<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지 - AI 민원 안내 챗봇</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<header>
    <div>
        <div class="logo">🏛 민원안내 AI 챗봇</div>
        <div class="subtitle">공공기관 민원 정보를 AI가 안내해 드립니다</div>
    </div>
</header>

<nav>
    <a href="index.html">민원 챗봇</a>
    <a href="admin.html">관리자 페이지</a>
</nav>

<div class="container">
    <h2 class="page-title">FAQ 관리</h2>

    <!-- FAQ 등록 -->
    <div class="form-box">
        <h3>FAQ 등록</h3>
        <input type="text" id="newQuestion" placeholder="질문 입력" />
        <textarea id="newAnswer" placeholder="답변 입력"></textarea>
        <button onclick="createFaq()">등록</button>
    </div>

    <!-- FAQ 목록 -->
    <table class="faq-table">
        <thead>
        <tr>
            <th>번호</th>
            <th>질문</th>
            <th>답변</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody id="faqList">
        </tbody>
    </table>
</div>

<footer>
    <p>© 2024 AI 민원 안내 챗봇 | 본 서비스는 프로젝트 목적으로 제작되었습니다.</p>
</footer>

<script src="js/admin.js"></script>
</body>
</html>
